<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nottingham00 · portfolio</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 2rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            animation: fadeUp 0.5s ease-out;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.08);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .avatar:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #1a2c3e;
            letter-spacing: -0.5px;
            margin-bottom: 0.3rem;
        }

        .location {
            font-size: 0.85rem;
            color: #5f7f9e;
            margin-bottom: 0.8rem;
        }

        .location i {
            margin-right: 6px;
        }

        .stats {
            background: #f0f4f9;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #2c3f55;
            margin: 0.8rem 0 1rem;
            font-weight: 500;
        }

        .stats i {
            font-size: 0.9rem;
            color: #3a6b92;
        }

        #commit-count {
            font-weight: 700;
            color: #1a5d8f;
            min-width: 50px;
            display: inline-block;
        }

        .bio {
            color: #2c3f55;
            font-size: 0.92rem;
            line-height: 1.45;
            margin: 1rem 0 1.8rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            background: #f0f4f9;
            border: 1px solid #dce5ec;
            border-radius: 40px;
            padding: 0.7rem;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1a2c3e;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn i {
            color: #4c6a8a;
            font-size: 1rem;
        }

        .btn:hover {
            background: #ffffff;
            border-color: #b9cfec;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 1.2rem 0 0.8rem;
        }

        .footer {
            font-size: 0.7rem;
            color: #8ba0b5;
        }

        .footer i {
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Replace with your actual photo URL -->
        <img class="avatar" src="https://ui-avatars.com/api/?background=2c3e50&color=fff&rounded=true&size=110&name=N00" alt="nottingham00 profile photo">
        
        <h1>nottingham00</h1>
        <div class="location">
            <i class="fas fa-map-marker-alt"></i> Philippines
        </div>

        <!-- Live commit counter -->
        <div class="stats">
            <i class="fas fa-code-commit"></i>
            <span>Total public commits:</span>
            <span id="commit-count">—</span>
        </div>

        <div class="bio">
            Game development & reverse engineering.<br>
            Desktop tooling, modding, and preservation.
        </div>

        <div class="links">
            <a href="https://github.com/nottingham00" class="btn" target="_blank">
                <i class="fab fa-github"></i> GitHub Profile
            </a>
            <a href="https://github.com/nottingham00?tab=repositories" class="btn" target="_blank">
                <i class="fas fa-code-branch"></i> All Repositories
            </a>
        </div>

        <hr>

        <div class="footer">
            <i class="far fa-envelope"></i> Available for collaboration · <span id="year"></span>
        </div>
    </div>

    <script>
        // Sync commit count from GitHub API
        const username = 'nottingham00';
        const commitSpan = document.getElementById('commit-count');

        async function fetchAllCommits() {
            try {
                // Step 1: get all public repos
                const reposRes = await fetch(`https://api.github.com/users/${username}/repos?per_page=100&sort=updated`);
                if (!reposRes.ok) throw new Error('Failed to fetch repos');
                const repos = await reposRes.json();
                
                let totalCommits = 0;
                // Step 2: fetch commits for each repo (last 100 per repo)
                const commitPromises = repos.map(async (repo) => {
                    if (repo.fork) return 0; // skip forks (optional, can remove if you want to count forks)
                    try {
                        const commitsRes = await fetch(`https://api.github.com/repos/${username}/${repo.name}/commits?per_page=100&author=${username}`);
                        if (!commitsRes.ok) return 0;
                        const commits = await commitsRes.json();
                        // If commits returned as array (and not limited by pagination), count them
                        return Array.isArray(commits) ? commits.length : 0;
                    } catch (err) {
                        console.warn(`Error fetching commits for ${repo.name}:`, err);
                        return 0;
                    }
                });
                
                const commitCounts = await Promise.all(commitPromises);
                totalCommits = commitCounts.reduce((sum, count) => sum + count, 0);
                
                // Animate the number update
                if (totalCommits > 0) {
                    animateNumber(commitSpan, 0, totalCommits, 800);
                } else {
                    commitSpan.textContent = '0';
                }
            } catch (error) {
                console.error('Failed to fetch commits:', error);
                commitSpan.textContent = '?';
                commitSpan.style.color = '#b91c1c';
            }
        }

        function animateNumber(element, start, end, duration) {
            const startTime = performance.now();
            const update = (currentTime) => {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = Math.floor(start + (end - start) * progress);
                element.textContent = current.toLocaleString();
                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    element.textContent = end.toLocaleString();
                }
            };
            requestAnimationFrame(update);
        }

        // Set current year
        document.getElementById('year').innerText = new Date().getFullYear();
        
        // Fetch commits on page load
        fetchAllCommits();
    </script>
</body>
</html>
