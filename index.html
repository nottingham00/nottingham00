<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nottingham00 · portfolio</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* minimal card */
        .card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 2rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            animation: fadeUp 0.5s ease-out;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.08);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* photo */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .avatar:hover {
            transform: scale(1.02);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #1a2c3e;
            letter-spacing: -0.5px;
            margin-bottom: 0.3rem;
        }

        .location {
            font-size: 0.85rem;
            color: #5f7f9e;
            margin-bottom: 1.2rem;
        }

        .location i {
            margin-right: 6px;
        }

        .bio {
            color: #2c3f55;
            font-size: 0.92rem;
            line-height: 1.45;
            margin: 1.2rem 0 1.8rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            background: #f0f4f9;
            border: 1px solid #dce5ec;
            border-radius: 40px;
            padding: 0.7rem;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1a2c3e;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn i {
            color: #4c6a8a;
            font-size: 1rem;
        }

        .btn:hover {
            background: #ffffff;
            border-color: #b9cfec;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 1.2rem 0 0.8rem;
        }

        .footer {
            font-size: 0.7rem;
            color: #8ba0b5;
        }

        .footer i {
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- replace with your own photo URL -->
        <img class="avatar" src="https://ui-avatars.com/api/?background=2c3e50&color=fff&rounded=true&size=110&name=N00" alt="nottingham00 profile photo">
        
        <h1>nottingham00</h1>
        <div class="location">
            <i class="fas fa-map-marker-alt"></i> Philippines
        </div>

        <div class="bio">
            Game development & reverse engineering.<br>
            Desktop tooling, modding, and preservation.
        </div>

        <div class="links">
            <a href="https://github.com/nottingham00" class="btn" target="_blank">
                <i class="fab fa-github"></i> GitHub Profile
            </a>
            <a href="https://github.com/nottingham00?tab=repositories" class="btn" target="_blank">
                <i class="fas fa-code-branch"></i> All Repositories
            </a>
        </div>

        <hr>

        <div class="footer">
            <i class="far fa-envelope"></i> Available for collaboration · <span id="year"></span>
        </div>
    </div>

    <script>
        document.getElementById('year').innerHTML = new Date().getFullYear();
    </script>
</body>
</html>
