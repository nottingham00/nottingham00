<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nottingham00 · portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
            padding: 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            transition: box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 20px 35px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            color: #1a1e2b;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .location {
            font-size: 0.9rem;
            color: #5b6e8c;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #e4e9f0;
            display: inline-block;
            padding-bottom: 0.35rem;
        }

        .bio {
            color: #334155;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 1.5rem 0 2rem 0;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin: 1.5rem 0;
        }

        .btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 0.75rem 1rem;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            color: #1e293b;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: #ffffff;
            border-color: #94a3b8;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        hr {
            border: none;
            border-top: 1px solid #eef2f6;
            margin: 1.5rem 0 1rem;
        }

        .footer {
            font-size: 0.75rem;
            color: #8b9ab0;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>nottingham00</h1>
        <div class="location">Philippines</div>

        <div class="bio">
            Game development & reverse engineering.<br>
            Focused on desktop tooling, modding, and preservation.
        </div>

        <div class="links">
            <a href="https://github.com/nottingham00" class="btn" target="_blank">
                GitHub Profile →
            </a>
            <a href="https://github.com/nottingham00?tab=repositories" class="btn" target="_blank">
                All Repositories →
            </a>
        </div>

        <hr>

        <div class="footer">
            Available for collaboration · <span id="year"></span>
        </div>
    </div>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();
    </script>
</body>
</html>
